<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin:0; background:#0a0e14; font-family: system-ui, sans-serif; color:#e2e8f0; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; padding:24px; max-width:760px; margin:0 auto; }
  .item { text-align:center; }
  canvas { width:100%; border-radius:8px; display:block; }
  h2 { font-size:14px; margin:10px 0 4px; color:#94a3b8; }
  p { font-size:12px; color:#64748b; margin:0; }
  .title { text-align:center; padding:24px 24px 0; font-size:20px; font-weight:600; }
  .sub { text-align:center; padding:6px 24px 16px; font-size:13px; color:#64748b; }
</style>
</head>
<body>
<div class="title">Диск vs Сфера</div>
<div class="sub">Левый — текущий (BackSide сфера, граница видна). Правый — новый подход (плоский диск, граница исчезает).</div>
<div class="grid">
  <div class="item">
    <canvas id="sphere" width="340" height="340"></canvas>
    <h2>Сейчас — BackSide сфера</h2>
    <p>Внешняя граница геометрии видна</p>
  </div>
  <div class="item">
    <canvas id="disc" width="340" height="340"></canvas>
    <h2>Новый — плоский диск</h2>
    <p>Свечение рассеивается в бесконечность, нет жёсткого края</p>
  </div>
</div>

<script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.161.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

const VS_NORM = `varying vec3 vNormal;
void main(){vNormal=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;

const VS_POS = `varying vec3 vWorldPos;
void main(){vWorldPos=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;

function makeBase(canvasId) {
  const canvas = document.getElementById(canvasId);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(340,340,false);
  renderer.setClearColor(0x0a0e14,1);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45,1,0.1,100);
  camera.position.z = 3.2;
  // globe
  const globe = new THREE.Mesh(
    new THREE.SphereGeometry(1,48,48),
    new THREE.MeshBasicMaterial({color:0x0d1420})
  );
  globe.rotation.x = 0.35;
  scene.add(globe);
  return { renderer, scene, camera, globe };
}

// ── LEFT: current BackSide sphere ──
{
  const {renderer, scene, camera, globe} = makeBase('sphere');
  const fs = `varying vec3 vNormal;void main(){
    float cosA=abs(dot(vNormal,vec3(0,0,1)));
    float rim=1.-exp(-cosA*2.);
    float nBias=clamp(vNormal.y,0.,1.);
    float wBias=clamp(-vNormal.x,0.,1.);
    float df=mix(0.05,1.,nBias*.65+wBias*.35);
    gl_FragColor=vec4(.35,.58,1.,rim*df*.9);}`;
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(1.3,32,32),
    new THREE.ShaderMaterial({vertexShader:VS_NORM,fragmentShader:fs,side:THREE.BackSide,
      blending:THREE.AdditiveBlending,transparent:true,depthWrite:false})
  ));
  let ry=0;
  (function tick(){requestAnimationFrame(tick);ry+=.004;globe.rotation.y=ry;renderer.render(scene,camera);})();
}

// ── RIGHT: flat disc approach ──
{
  const {renderer, scene, camera, globe} = makeBase('disc');

  // Large disc at z=0, facing camera
  const fs = `varying vec3 vWorldPos;void main(){
    float r=length(vWorldPos.xy);
    // glow from globe surface (r=1) outward, fades to 0
    float glow=exp(-(r-1.0)*3.0);
    if(r<1.0) glow=0.0; // inside globe — depth test handles this but discard cleanly
    // directional bias: top (y>0) and left (x<0) brighter
    float ny=r>0.01?vWorldPos.y/r:0.;
    float nx=r>0.01?vWorldPos.x/r:0.;
    float nBias=clamp(ny,0.,1.);
    float wBias=clamp(-nx,0.,1.);
    float df=mix(0.05,1.,nBias*.65+wBias*.35);
    float alpha=glow*df*1.1;
    if(alpha<0.002) discard;
    gl_FragColor=vec4(.35,.58,1.,alpha);}`;

  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(3.0, 64),
    new THREE.ShaderMaterial({
      vertexShader: VS_POS,
      fragmentShader: fs,
      blending: THREE.AdditiveBlending,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide,
    })
  );
  scene.add(disc);
  let ry=0;
  (function tick(){requestAnimationFrame(tick);ry+=.004;globe.rotation.y=ry;renderer.render(scene,camera);})();
}
</script>
</body>
</html>
